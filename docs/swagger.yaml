host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is the core backend service for SEP490 project with authentication,
    user management, and business features.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: SEP490 Core Backend API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with credentials
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.LoginResponse'
              type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: User Login
      tags:
      - Authentication
  /api/v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Logout user and invalidate refresh token
      parameters:
      - description: Logout requests
        in: body
        name: requests
        required: true
        schema:
          $ref: '#/definitions/requests.LogoutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.LogoutResponse'
              type: object
        "400":
          description: Invalid requests
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: User Logout
      tags:
      - Authentication
  /api/v1/auth/logout-all:
    post:
      consumes:
      - application/json
      description: Logout user from all active sessions
      produces:
      - application/json
      responses:
        "200":
          description: All sessions logged out successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.LogoutResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: Logout All Sessions
      tags:
      - Authentication
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Generate new access token using refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.LoginResponse'
              type: object
        "400":
          description: Invalid requests
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Refresh Access Token
      tags:
      - Authentication
  /api/v1/auth/sessions:
    get:
      consumes:
      - application/json
      description: Retrieve user's active sessions
      produces:
      - application/json
      responses:
        "200":
          description: Active sessions retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/responses.SessionInfo'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: Get Active Sessions
      tags:
      - Authentication
  /api/v1/auth/sessions/{sessionId}:
    delete:
      consumes:
      - application/json
      description: Revoke a specific user session
      parameters:
      - description: Session ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Session revoked successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.LogoutResponse'
              type: object
        "400":
          description: Invalid session ID
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: Revoke Session
      tags:
      - Authentication
  /api/v1/auth/signup:
    post:
      consumes:
      - application/json
      description: Register a new user account
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.SignUpRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.SignUpResponse'
              type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "409":
          description: User already exists
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: User Registration
      tags:
      - Authentication
  /api/v1/brands:
    get:
      consumes:
      - application/json
      description: Get paginated list of brands with optional filters
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Search keywords for brand name
        in: query
        name: keywords
        type: string
      - description: Filter by brand status
        enum:
        - ACTIVE
        - INACTIVE
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Brands fetched successfully
          schema:
            $ref: '#/definitions/responses.BrandPaginationResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: Get Brands List by filter
      tags:
      - Brands
    post:
      consumes:
      - application/json
      description: Create a new brand
      parameters:
      - description: Brand creation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.CreateBrandRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Brand created successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.BrandResponse'
              type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: Create Brand
      tags:
      - Brands
  /api/v1/brands/{id}:
    get:
      consumes:
      - application/json
      description: Get brand details by ID
      parameters:
      - description: Brand ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Brand fetched successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.BrandDetailResponse'
              type: object
        "400":
          description: Invalid brand ID
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "404":
          description: Brand not found
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: Get Brand by ID
      tags:
      - Brands
    put:
      consumes:
      - application/json
      description: Update brand details by ID
      parameters:
      - description: Brand ID
        in: path
        name: id
        required: true
        type: string
      - description: Brand update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.UpdateBrandRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Brand updated successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.BrandResponse'
