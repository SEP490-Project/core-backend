    - PUBLIC_TO_EVERYONE
    - FOLLOWER_OF_CREATOR
    - MUTUAL_FOLLOW_FRIENDS
    - SELF_ONLY
    type: string
    x-enum-varnames:
    - TikTokPrivacyLevelPublicToEveryone
    - TikTokPrivacyLevelFollowerOfCreator
    - TikTokPrivacyLevelMutualFollowFriends
    - TikTokPrivacyLevelSelfOnly
