paths:
  /api/v1/affiliate-links:
    get:
      description: Retrieve a paginated list of affiliate links with optional filtering
      parameters:
      - description: Filter by Contract ID
        in: query
        name: contract_id
        type: string
      - description: Filter by Content ID
        in: query
        name: content_id
        type: string
      - description: Filter by Channel ID
        in: query
        name: channel_id
        type: string
      - description: Filter by status (active, inactive, expired)
        in: query
        name: status
        type: string
      - description: 'Page size (default: 20, max: 100)'
        in: query
        name: page_size
        type: integer
      - description: 'Page number (default: 1)'
        in: query
        name: page_number
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Affiliate links retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.AffiliateLinkListResponse'
              type: object
        "400":
          description: Invalid request parameters
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: List Affiliate Links
      tags:
      - AffiliateLinks
    post:
      consumes:
      - application/json
      description: Create a new affiliate link or return existing one for the same
        context
      parameters:
      - description: Affiliate link creation data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.CreateAffiliateLinkRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Existing affiliate link returned
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.AffiliateLinkResponse'
              type: object
        "201":
          description: Affiliate link created successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.AffiliateLinkResponse'
              type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "404":
          description: Contract/Content/Channel not found
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: Create or Get Affiliate Link
      tags:
      - AffiliateLinks
  /api/v1/affiliate-links/{id}:
    delete:
      description: Soft-delete an affiliate link
      parameters:
      - description: Affiliate Link ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Affiliate link deleted successfully
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "404":
          description: Affiliate link not found
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete Affiliate Link
      tags:
      - AffiliateLinks
    get:
      description: Retrieve a specific affiliate link by its ID
      parameters:
      - description: Affiliate Link ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Affiliate link retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.AffiliateLinkResponse'
              type: object
        "404":
          description: Affiliate link not found
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: Get Affiliate Link by ID
      tags:
      - AffiliateLinks
    put:
      consumes:
      - application/json
      description: Update an affiliate link's status or tracking URL
      parameters:
      - description: Affiliate Link ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.UpdateAffiliateLinkRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Affiliate link updated successfully
          schema:
            allOf:
            - $ref: '#/definitions/responses.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.AffiliateLinkResponse'
              type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "404":
          description: Affiliate link not found
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      security:
      - BearerAuth: []
      summary: Update Affiliate Link
      tags:
      - AffiliateLinks
