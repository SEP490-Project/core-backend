      access_token:
        type: string
    type: object
  dtos.KPIGoal:
    properties:
      description:
        example: Achieve 10,000 views on the video content
        type: string
      metric:
        example: VIEW
        type: string
      target:
        example: "10000"
        type: string
    type: object
  dtos.LegalTerms:
    properties:
      breach_of_contract:
        $ref: '#/definitions/dtos.BreachOfContract'
      standard_terms:
        $ref: '#/definitions/dtos.StandardTerm'
    required:
    - breach_of_contract
    - standard_terms
