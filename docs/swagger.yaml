      tags:
      - Health
  /r/{hash}:
    get:
      consumes:
      - application/json
      description: Resolves affiliate link hash and redirects to tracking URL while
        logging click event asynchronously
      parameters:
      - description: 16-character affiliate link hash
        in: path
        name: hash
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirects to tracking URL
        "404":
          description: Affiliate link not found
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "410":
          description: Affiliate link expired or inactive
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "429":
          description: Rate limit exceeded
          schema:
            $ref: '#/definitions/responses.APIResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/responses.APIResponse'
      summary: Redirect to affiliate tracking URL
      tags:
      - Redirect
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
