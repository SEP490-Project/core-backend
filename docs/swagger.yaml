      consumes:
      - application/json
      description: Create a new variant attribute
      parameters:
      - description: Attribute data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/requests.CreateVariantAttributeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
