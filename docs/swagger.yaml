  requests.UpdateProfileRequest:
    properties:
      date_of_birth:
        type: string
      full_name:
        example: John Doe
        maxLength: 100
        minLength: 3
        type: string
      phone:
        example: "+1234567890"
        type: string
      shipping_address:
