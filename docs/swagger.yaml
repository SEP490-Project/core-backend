definitions:
  dtos.AdvertisedItem:
    properties:
      content_requirements:
        example:
        - Include product demo and customer testimonials
        items:
          type: string
        type: array
      creative_notes:
        example: Use bright colors and upbeat music
        maxLength: 1000
        type: string
      description:
        example: This is product A
        maxLength: 1000
        type: string
      hash_tag:
        example:
        - '#bestproduct #awesome'
        items:
          type: string
        type: array
      id:
        example: 1
        type: integer
      material_url:
        example:
        - https://example.com/image1.jpg
        - https://example.com/image2.jpg
        items:
          type: string
        type: array
      metrics:
        items:
          $ref: '#/definitions/dtos.KPIGoal'
        type: array
      name:
        example: Product A
        maxLength: 255
        type: string
      platform:
        enum:
        - FACEBOOK
        - TIKTOK
        - WEBSITE
        example: FACEBOOK
        type: string
      tagline:
        example: Best product ever
        maxLength: 255
        type: string
    required:
    - platform
    type: object
  dtos.ApplicationDeliveryFeeItem:
    properties:
      height:
        type: integer
      length:
        type: integer
      name:
        type: string
      price:
        type: integer
      quantity:
        type: integer
      weight:
        type: integer
      width:
        type: integer
    type: object
  dtos.BrandAmbassadorEvent:
    properties:
      activities:
        example:
        - Product demonstration
        - ' Q&A session'
        items:
          type: string
        maxItems: 1000
        type: array
      date:
        example: "2023-10-01 15:00:00"
        type: string
      expected_duration:
        example: 3H
        maxLength: 100
        type: string
      id:
        example: 1
        type: integer
      kpis:
        items:
          $ref: '#/definitions/dtos.KPIGoal'
        type: array
      location:
        example: Jakarta Convention Center
        maxLength: 512
        type: string
      name:
        example: Launch Event
        maxLength: 255
        type: string
      representation_rules:
        example:
        - Must wear formal attire with long leggings
        items:
          type: string
        type: array
    type: object
  dtos.BreachOfContract:
    properties:
      items:
        items:
          $ref: '#/definitions/dtos.BreachOfContractItem'
        type: array
      label:
        example: Breach of Contract
        maxLength: 1024
        minLength: 1
        type: string
    required:
    - items
    - label
    type: object
  dtos.BreachOfContractItem:
    properties:
      compensation_percent:
        example: 50
        maximum: 100
        minimum: 0
        type: integer
      details:
        example:
        - '[''The contract will be terminated immediately.'''
        - ' ''Party A will loses (forfeits) the money they have paid to Party B.'']'
        items:
          type: string
        type: array
      title:
        example: Party A (The Brand) has breached its contract with Party B (The KOL)
        maxLength: 1024
        minLength: 1
        type: string
    required:
    - title
    type: object
  dtos.CoProducingConcept:
    properties:
      content_requirements:
        example:
        - Include product demo and customer testimonials
        items:
          type: string
        type: array
      creative_notes:
        example: Use bright colors and upbeat music
        maxLength: 1000
        type: string
      description:
        example: This is product A
        maxLength: 1000
        type: string
      hash_tag:
        example:
        - '#bestproduct #awesome'
        items:
          type: string
        type: array
      id:
        example: 1
        type: integer
      material_url:
        example:
        - https://example.com/image1.jpg
        - https://example.com/image2.jpg
        items:
          type: string
        type: array
      metrics:
        items:
          $ref: '#/definitions/dtos.KPIGoal'
        type: array
      name:
        example: Product A
        maxLength: 255
        type: string
      platform:
        enum:
        - FACEBOOK
        - TIKTOK
        - WEBSITE
        example: FACEBOOK
        type: string
      product_id:
        example: 1
        type: integer
      tagline:
        example: Best product ever
        maxLength: 255
        type: string
    required:
    - platform
    type: object
  dtos.CoProducingProduct:
    properties:
      description:
        example: This is product A
        maxLength: 1000
        type: string
      id:
        example: 1
        type: integer
      kpis:
        items:
          $ref: '#/definitions/dtos.KPIGoal'
        type: array
      material:
        example:
        - https://example.com/image1.jpg
        - https://example.com/image2.jpg
        items:
          type: string
        type: array
      name:
        example: Product A
        maxLength: 255
        type: string
    type: object
  dtos.Deliverable:
    properties:
      advertised_items:
        items:
          $ref: '#/definitions/dtos.AdvertisedItem'
        minItems: 1
        type: array
      concepts:
        items:
          $ref: '#/definitions/dtos.CoProducingConcept'
        minItems: 1
        type: array
      events:
        items:
          $ref: '#/definitions/dtos.BrandAmbassadorEvent'
        minItems: 1
        type: array
      platform:
        example:
        - FACEBOOK
        - TIKTOK
        items:
          type: string
        minItems: 1
        type: array
      products:
        items:
          $ref: '#/definitions/dtos.CoProducingProduct'
        minItems: 1
        type: array
      tracking_link:
        example: https://affiliate.example.com/track?ref=12345
        maxLength: 500
        type: string
    type: object
  dtos.DeliveryAvailableServiceDTO:
    properties:
      service_id:
        type: integer
      service_type_id:
        type: integer
      short_name:
        type: string
    type: object
  dtos.DeliveryFeeSuccess:
    properties:
      cod_failed_fee:
        type: integer
      cod_fee:
        type: integer
      coupon_value:
        type: integer
      deliver_remote_areas_fee:
        type: integer
      document_return:
        type: integer
      double_check:
        type: integer
      insurance_fee:
        type: integer
      pick_remote_areas_fee:
        type: integer
      pick_station_fee:
        type: integer
      r2s_fee:
        type: integer
      return_again:
        type: integer
      service_fee:
        type: integer
      total:
        type: integer
    type: object
  dtos.ExpectedDeliveryTime:
    properties:
      leadtime:
        type: integer
      leadtime_order:
        properties:
          from_estimate_date:
            type: string
          to_estimate_date:
            type: string
        type: object
    type: object
  dtos.FinancialTerms:
    properties:
      base_per_click:
        description: If the model is "LEVELS" and the CONTRACT_TYPE is "AFFILIATE"
        example: 1000
        minimum: 0
        type: integer
      cost_breakdown:
        additionalProperties:
          type: integer
        type: object
      levels:
        items:
          $ref: '#/definitions/dtos.Level'
        type: array
      model:
        description: Common fields
        enum:
        - FIXED
        - LEVELS
        - SHARE
        example: FIXED
        type: string
      payment_cycle:
        allOf:
        - $ref: '#/definitions/enum.PaymentCycle'
        enum:
        - MONTHLY
        - QUARTERLY
        - ANNUALLY
        example: MONTHLY
      payment_date:
        description: Change this depending on PaymentCycle
      payment_method:
        description: If the model is "FIXED" and the CONTRACT_TYPE is "ADVERTISING"
          or "BRAND_AMBASSADOR"
        enum:
        - BANK_TRANSFER
        - CREDIT_CARD
        example: BANK_TRANSFER
        type: string
      profit_distribution_cycle:
        allOf:
        - $ref: '#/definitions/enum.PaymentCycle'
        enum:
        - MONTHLY
        - QUARTERLY
        - ANNUALLY
        example: QUARTERLY
      profit_distribution_date:
        description: Change this depending on ProfitDistributionCycle
      profit_split_company_percent:
        description: If the model is "SHARE" and the CONTRACT_TYPE is "CO_PRODUCING"
        example: 60
        maximum: 100
        minimum: 0
        type: integer
      profit_split_kol_percent:
        example: 40
        maximum: 100
        minimum: 0
        type: integer
      schedule:
        items:
          $ref: '#/definitions/dtos.Schedule'
        type: array
      tax_withholding:
        $ref: '#/definitions/dtos.TaxWithholding'
      total_cost:
        example: 10000000
        minimum: 0
        type: integer
    type: object
  dtos.GHNServiceToken:
    properties:
      callback_url:
        type: string
      code:
        type: string
    type: object
  dtos.GHNSessionResponse:
    properties:
      otp_phone_number:
