definitions:
  dtos.AdvertisedItem:
    properties:
      content_ids:
        items:
          type: string
        type: array
      content_requirements:
        example:
        - Include product demo and customer testimonials
        items:
          type: string
        type: array
      creative_notes:
        example: Use bright colors and upbeat music
        maxLength: 1000
        type: string
      description:
        example: This is product A
        maxLength: 1000
        type: string
      hash_tag:
        example:
        - '#bestproduct #awesome'
        items:
          type: string
        type: array
      id:
        example: 1
        type: integer
      kpis:
        items:
          $ref: '#/definitions/dtos.KPIGoal'
        type: array
      material_url:
        example:
        - https://example.com/image1.jpg
        - https://example.com/image2.jpg
        items:
          type: string
        type: array
      name:
        example: Product A
        maxLength: 255
        type: string
      platform:
        enum:
        - FACEBOOK
        - TIKTOK
        - WEBSITE
        example: FACEBOOK
        type: string
      tagline:
        example: Best product ever
        maxLength: 255
        type: string
      task_ids:
        items:
          type: string
        type: array
    required:
    - platform
    type: object
  dtos.ApplicationDeliveryFeeItem:
    properties:
      height:
        type: integer
      length:
        type: integer
      name:
        type: string
      price:
        type: integer
      quantity:
        type: integer
      weight:
        type: integer
      width:
        type: integer
    type: object
  dtos.BrandAmbassadorEvent:
    properties:
      activities:
        example:
        - Product demonstration
        - ' Q&A session'
        items:
          type: string
        maxItems: 1000
        type: array
      date:
        example: "2023-10-01 15:00:00"
        type: string
      expected_duration:
        example: 3H
        maxLength: 100
        type: string
      id:
        example: 1
        type: integer
      kpis:
        items:
          $ref: '#/definitions/dtos.KPIGoal'
        type: array
      location:
        example: Jakarta Convention Center
        maxLength: 512
        type: string
      name:
        example: Launch Event
        maxLength: 255
        type: string
      representation_rules:
        example:
        - Must wear formal attire with long leggings
        items:
          type: string
        type: array
      task_ids:
        items:
          type: string
        type: array
    type: object
  dtos.BreachOfContract:
    properties:
      items:
        items:
          $ref: '#/definitions/dtos.BreachOfContractItem'
        type: array
      label:
        example: Breach of Contract
        maxLength: 1024
        minLength: 1
        type: string
    required:
    - items
    - label
    type: object
  dtos.BreachOfContractItem:
    properties:
      compensation_percent:
        example: 50
        maximum: 100
        minimum: 0
        type: integer
      details:
        example:
        - '[''The contract will be terminated immediately.'''
        - ' ''Party A will loses (forfeits) the money they have paid to Party B.'']'
        items:
          type: string
        type: array
      title:
        example: Party A (The Brand) has breached its contract with Party B (The KOL)
        maxLength: 1024
        minLength: 1
        type: string
    required:
    - title
    type: object
  dtos.CoProducingConcept:
    properties:
      content_ids:
        items:
          type: string
        type: array
      content_requirements:
        example:
        - Include product demo and customer testimonials
        items:
          type: string
        type: array
      creative_notes:
        example: Use bright colors and upbeat music
        maxLength: 1000
        type: string
      description:
        example: This is product A
        maxLength: 1000
        type: string
      hash_tag:
        example:
        - '#bestproduct #awesome'
        items:
          type: string
        type: array
      id:
        example: 1
        type: integer
      kpis:
        items:
          $ref: '#/definitions/dtos.KPIGoal'
        type: array
      material_url:
        example:
        - https://example.com/image1.jpg
        - https://example.com/image2.jpg
        items:
          type: string
        type: array
      name:
        example: Product A
        maxLength: 255
        type: string
      platform:
        enum:
        - FACEBOOK
        - TIKTOK
        - WEBSITE
        example: FACEBOOK
        type: string
      product_id:
        example: 1
        type: integer
      product_ids:
        items:
          type: string
        type: array
      tagline:
        example: Best product ever
        maxLength: 255
        type: string
      task_ids:
        items:
          type: string
        type: array
    required:
    - platform
    type: object
  dtos.CoProducingProduct:
    properties:
      description:
        example: This is product A
        maxLength: 1000
        type: string
      id:
        example: 1
        type: integer
      kpis:
        items:
          $ref: '#/definitions/dtos.KPIGoal'
        type: array
      material:
        example:
        - https://example.com/image1.jpg
        - https://example.com/image2.jpg
        items:
          type: string
        type: array
      name:
        example: Product A
        maxLength: 255
        type: string
      product_ids:
