        type: string
      end_date:
        example: "2023-12-31T23:59:59Z"
        type: string
      financial_terms:
        description: Complex JSONB fields (optional for updates)
      legal_terms: {}
      parent_contract_id:
        description: Parent contract (for amendments or related contracts)
