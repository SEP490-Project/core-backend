  host: "smtp.gmail.com"
  port: 587
  username: "" # Set via GMAIL_SMTP_USERNAME env var
  password: "" # Set via GMAIL_APP_PASSWORD env var (use app password, not regular password)
  from_name: "BShowSell Notification"
  from_email: "" # Set via GMAIL_SMTP_FROM_EMAIL env var

# Firebase Cloud Messaging configuration
firebase_fcm:
  service_account_path: "" # Set via FIREBASE_SERVICE_ACCOUNT_PATH env var
  project_id: "" # Set via FIREBASE_PROJECT_ID env var

# Notification settings
notification:
  template_dir: "templates/emails"
  max_retries: 3
  retry_delays:
    - 2 # seconds
    - 4
    - 8
  rate_limits:
    email_per_minute: 30
    push_per_minute: 500
  consumer_concurrency:
    email: 5 # Number of concurrent email consumer workers
    push: 10 # Number of concurrent push consumer workers

# Scheduler settings
task_scheduler:
  location_synchronization:
    enabled: false
    sync_hour: 3
    concurrency: 5


social:
  facebook:
    base_url: "https://graph.facebook.com"
    client_id: ""
    client_secret: ""
    api_version: "24.0"
    redirect_url: "http://localhost:8080/api/v1/auth/facebook/callback"
    frontend_redirect_url: "https://bshowsell.site/social/success"
    frontend_cancel_url: "https://bshowsell.site/social/error"
    scopes:
      - "pages_show_list"
      - "pages_messaging"
      - "pages_read_engagement"
      - "pages_manage_posts"
      - "pages_manage_metadata"
      - "pages_manage_engagement"
      - "publish_video"
      - "public_profile"
    response_type: "code"
  tiktok:
    base_url: "https://open.tiktokapis.com"
    client_key: ""
    client_secret: ""
    api_version: "2"
    redirect_url: "http://localhost:8080/api/v1/auth/tiktok/callback"
    frontend_redirect_url: "https://bshowsell.site/social/success"
    frontend_cancel_url: "https://bshowsell.site/social/error"
    user_scopes: 
      - "user.info.basic"
      - "user.info.profile"
      - "video.list"
    scopes:
      - "user.info.basic"
      - "video.upload"
      - "video.publish"
      - "user.info.profile"
      - "user.info.stats"
      - "video.list"
      - "research.data.basic"
    response_type: "code"

# Token Storage Configuration (OAuth tokens)
token_storage:
  # For database backend: 32-byte AES-256 key (hex-encoded = 64 characters)
  # Generate with: openssl rand -hex 32
  encryption_key: ""
  
  # For vault backend
  vault_path_prefix: "secret/data/social-tokens"
  use_vault: false  # Set to true to use Vault instead of database encryption
