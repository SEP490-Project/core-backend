# Server configuration
server:
  port: 8080
  service_name: bshowsell
  environment: "development" # development, production
  timeout: 600
  payos_link_expiry: 300 #seconds
  timezone: "Asia/Ho_Chi_Minh"
  base_url: "http://localhost:8080"
  base_frontend_url: "https://bshowsell.site"

http_client:
  timeout: 60 # seconds
  max_idle_conns: 100
  max_idle_conns_per_host: 10
  idle_conn_timeout: 90 # seconds
  tls_handshake_timeout: 20 # seconds
  expect_continue_timeout: 20 # seconds

# Database configuration (PostgreSQL)
database:
  host: "postgres.trangiangkhanh.online"
  port: 5432
  user: "postgres"
  password: "170504"
  dbname: "sep490_db_stag"
  sslmode: "disable"

# Cache (Valkey/Redis)
cache:
  host: "trangiangkhanh.online"
  port: 6379
  db: 0
  password: "170504"

# Asynq Task Scheduler (uses Valkey/Redis)
asynq:
  enabled: true
  db: 1  # Use separate DB from cache to avoid conflicts
  concurrency: 10
  task_types:
    content_schedule: "task:content:schedule"
    notification_schedule: "task:notification:schedule"
    cancel_payment_schedule: "task:payment:cancel"
    auto_receive_order: "task:order:auto-receive"

# JWT configuration
jwt:
  algorithm: "RS256"
  expiry_hours: 72
  access_expiry_hours: 1
  refresh_expiry_hours: 72
  private_key_file: "private.pem"
  public_key_file: "public.pem"
  private_key: ""
  public_key: ""
  # HashiCorp Vault integration for RSA key storage
  vault:
    enabled: false
    address: "http://localhost:8200"
    token: ""
    secret_path: "secret/jwt-keys"
    private_key_field: "private_key"
    public_key_field: "public_key"

# Logging configuration
log:
  level: "debug" # debug, info, warn, error

# CORS configuration
cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allowed_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"
  exposed_headers:
    - "Content-Type"
    - "Authorization"
  allow_credentials: true

# OpenTelemetry configuration
otel:
  enabled: true
  endpoint: "localhost:4317"
  insecure: true
  service_name: "my_service"

# RabbitMQ configuration
rabbitmq:
  url: ""
  host: "154.26.132.131"
  port: 5672
  username: "admin"
  password: "170504"
  vhost: "/"
  management_url: "http://154.26.132.131:15672"
  reconnectDelayMs: 5000
  connectionTimeoutMs: 10000
  heartbeat: 30

# WebSocket configuration
websocket:
  enabled: true
  endpoint: "/ws"
  allowed_origins:
    - "*"

