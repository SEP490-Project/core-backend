topology:
  exchanges:
    - name: exchange.notification
      type: topic
      durable: true
      autoDelete: false
      queues:
        - name: queue.notification.email
          routingKey: notification.email
          durable: true
          autoDelete: false
          prefetch: 10
          retry:
            enabled: true
            suffix: retry
            ttlMs: 2000
            maxAttempts: 3
            exponentialMultiply: 2
            exchange: exchange.notification
          dlq:
            enabled: true
            suffix: dlq
            exchange: exchange.notification
        - name: queue.notification.push
          routingKey: notification.push
          durable: true
          autoDelete: false
          prefetch: 50
          retry:
            enabled: true
            ttlMs: 2000
            maxAttempts: 3
            exponentialMultiply: 2
          dlq:
            enabled: true
    - name: exchange.excel_import
      type: topic
      durable: true
      autoDelete: false
      queues:
        - name: queue.excel_import.products
          routingKey: excel_import.products
          durable: true
          autoDelete: false
          prefetch: 1
          retry:
            enabled: true
            ttlMs: 60000
            maxAttempts: 3
            exponentialMultiply: 1.5
          dlq:
            enabled: true
    - name: exchange.contract
      type: topic
      durable: true
      autoDelete: false
      queues:
        - name: queue.contract.create
          routingKey: contract.create
          durable: true
          autoDelete: false
          prefetch: 1
          retry:
            enabled: true
            ttlMs: 60000
            maxAttempts: 3
            exponentialMultiply: 1.5
          dlq:
            enabled: true
        - name: queue.contract.create_payment
          routingKey: contract.create_payment
          durable: true
          autoDelete: false
          prefetch: 1
          retry:
            enabled: true
            ttlMs: 60000
            maxAttempts: 3
            exponentialMultiply: 1.5
          dlq:
            enabled: true
    - name: exchange.video_upload
      type: topic
      durable: true
      autoDelete: false
      queues:
        - name: queue.video.upload
          routingKey: video.upload
          durable: true
          autoDelete: false
          prefetch: 1
          retry:
            enabled: true
            ttlMs: 60000
            maxAttempts: 3
            exponentialMultiply: 1.5
          dlq:
            enabled: true

producers:
  - name: notification-email-producer
    exchange: exchange.notification
    routingKey: notification.email
    confirm: true
    mandatory: false
    persistent: true
    retry:
      enabled: true
      maxAttempts: 3
      backoffMs: 1000
      exponentialMultiply: 2.0
  - name: excel-import-producer
    exchange: exchange.excel_import
    routingKey: excel_import.products
    confirm: true
    persistent: true
    retry:
      enabled: true
      maxAttempts: 5
      backoffMs: 2000
      exponentialMultiply: 2.0
  - name: contract-create-producer
    exchange: exchange.contract
    routingKey: contract.create
    confirm: true
    persistent: true
    retry:
      enabled: true
      maxAttempts: 5
      backoffMs: 2000
      exponentialMultiply: 2.0
  - name: contract-create-payment-producer
    exchange: exchange.contract
    routingKey: contract.create_payment
    confirm: true
    persistent: true
    retry:
      enabled: true
      maxAttempts: 5
      backoffMs: 2000
      exponentialMultiply: 2.0
  - name: video-upload-producer
    exchange: exchange.video_upload
    routingKey: video.upload
    confirm: true
    persistent: true
    retry:
      enabled: true
      maxAttempts: 5
      backoffMs: 2000
      exponentialMultiply: 2.0

consumers:
  - name: notification-email-consumer
    queue: queue.notification.email
    prefetch: 1
    concurrency: 3
    autoAck: false
    requeueOnError: false
    backoffMs: 2000
    exponentialMultiply: 1.5
  - name: notification-push-consumer
    queue: queue.notification.push
    prefetch: 1
    concurrency: 3
    autoAck: false
    requeueOnError: false
    backoffMs: 2000
  - name: excel-import-products-consumer
    queue: queue.excel_import.products
    prefetch: 1
    concurrency: 2
    autoAck: false
    requeueOnError: false
    backoffMs: 5000
  - name: contract-create-consumer
    queue: queue.contract.create
    prefetch: 1
    concurrency: 1
    autoAck: false
    requeueOnError: false
    backoffMs: 5000
  - name: contract-create-payment-consumer
    queue: queue.contract.create_payment
    prefetch: 1
    concurrency: 1
    autoAck: false
    requeueOnError: false
    backoffMs: 5000
  - name: video-upload-consumer
    queue: queue.video.upload
    prefetch: 1
    concurrency: 2
    autoAck: false
    requeueOnError: false
    backoffMs: 5000
