<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>GHN Update Delivery Status</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --ghn-orange: #FF6A00;
            --ghn-blue: #004AAD;
        }
    </style>

</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="bg-white w-full max-w-xl p-8 rounded-2xl shadow-lg border-t-4" style="border-color: var(--ghn-orange)">
    <h2 class="text-2xl font-bold mb-6 text-center" style="color: var(--ghn-blue)">
        Cập nhật trạng thái đơn hàng GHN
    </h2>

    <div class="space-y-4">

        <!-- Order Code -->
        <div>
            <label class="block font-medium mb-1">Mã đơn hàng (order_code)</label>
            <input id="orderCode"
                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[var(--ghn-orange)] focus:outline-none"
                   placeholder="VD: S2Y3D4">
        </div>

        <!-- Status -->
        <div>
            <label class="block font-medium mb-1">Chọn trạng thái</label>
            <select id="status"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-[var(--ghn-orange)] focus:outline-none">
                <option value="ready_to_pick">Ready to Pick</option>
                <option value="storing">Storing</option>
                <option value="delivering">Delivering</option>
                <option value="delivered">Delivered</option>
                <option value="cancel">Cancel</option>
            </select>
        </div>

        <!-- Button -->
        <button onclick="updateStatus()"
                class="w-full py-3 mt-2 rounded-lg font-semibold text-white text-lg shadow-md transition-all hover:opacity-90"
                style="background-color: var(--ghn-orange)">
            Gửi yêu cầu cập nhật
        </button>

        <!-- Result Box -->
        <div>
            <h3 class="font-semibold mb-2 text-[var(--ghn-blue)]">Kết quả:</h3>
            <pre id="result"
                 class="bg-gray-900 text-green-400 text-sm p-4 rounded-lg overflow-auto max-h-60"></pre>
        </div>
    </div>
</div>


<script>
    async function updateStatus() {
        const orderCode = document.getElementById("orderCode").value.trim();
        const status = document.getElementById("status").value;

        if (!orderCode) {
            alert("Vui lòng nhập mã đơn hàng");
            return;
        }

        const payload = {
            order_code: orderCode,
            status: status
        };

        document.getElementById("result").textContent = "⏳ Đang gửi request...";

        try {
            const res = await fetch("https://api.bshowsell.site/api/v1/ghn/order/status", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const responseText = await res.text();

            try {
                const json = JSON.parse(responseText);

                // ⭐ Trả về chỉ data.message
                const message = json?.data?.message || "Không có message trong response";

                document.getElementById("result").textContent = message;

            } catch (e) {
                document.getElementById("result").textContent = responseText;
            }
        } catch (err) {
            document.getElementById("result").textContent =
                "❌ Lỗi: " + err.toString();
        }
    }
</script>

</body>
</html>
